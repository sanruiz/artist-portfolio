name: Bug Report
description: Report a bug in the Artist Portfolio plugin
title: "[Bug]: "
labels: ["bug", "triage"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the form below.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: A clear description of what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain your problem.

  - type: dropdown
    id: wordpress-version
    attributes:
      label: WordPress Version
      description: What version of WordPress are you running?
      options:
        - 6.4.x
        - 6.3.x
        - 6.2.x
        - 6.1.x
        - Other (please specify in additional context)
    validations:
      required: true

  - type: dropdown
    id: php-version
    attributes:
      label: PHP Version
      description: What version of PHP are you running?
      options:
        - 8.2
        - 8.1
        - 8.0
        - 7.4
        - Other (please specify in additional context)
    validations:
      required: true

  - type: checkboxes
    id: wpgraphql
    attributes:
      label: WPGraphQL Plugin
      description: Are you using WPGraphQL?
      options:
        - label: WPGraphQL is installed and activated
        - label: The issue is related to GraphQL functionality

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context about the problem here (browser, plugins, themes, etc.).
